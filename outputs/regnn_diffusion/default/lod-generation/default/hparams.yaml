mode: train
seed: 42
data:
  dataset_dir: data/The Hague
  lods:
  - 2
  normalize_coords: true
  num_workers: 1
  n_max: null
model:
  num_node_classes: 2
  hidden_dim: 64
  num_layers: 4
  T: 500
  discrete_noise_type: uniform
training:
  batch_size: 32
  train_val_test_split:
  - 0.8
  - 0.1
  - 0.1
  lr: 0.001
  max_epochs: 100
  gradient_clip_val: null
  lr_scheduler: none
  lr_decay_steps: 50
  lr_decay_rate: 0.5
  early_stopping:
    enabled: true
    monitor: val_coord_mse
    patience: 10
    mode: min
  checkpoint:
    enabled: true
    monitor: val_coord_mse
    mode: min
    save_top_k: 3
    filename: '{epoch:02d}-{val_coord_mse:.4f}'
trainer:
  accelerator: auto
  devices: 1
  precision: '32'
  log_every_n_steps: 50
logging:
  loggers:
  - tensorboard
  project_name: lod-generation
  experiment_name: regnn_diffusion
  run_name: default
  save_dir: outputs
  wandb_entity: null
  wandb_offline: false
  log_model: false
inference:
  checkpoint_path: null
  batch_size: 10
  edge_threshold: 0.5
  output_dir: outputs/generated
resume_from: null
num_node_classes: 2
hidden_dim: 64
num_layers: 4
T: 500
lr: 0.001
discrete_noise_type: uniform
n_max: 10685
lr_scheduler: none
lr_decay_steps: 50
lr_decay_rate: 0.5
