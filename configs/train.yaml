# Training Configuration for CityJSON LOD Generation
# Usage: python main.py --config configs/train.yaml

mode: train
seed: 42

# Data settings
data:
  dataset_dir: data/The Hague
  lods:
    - 2
  normalize_coords: true
  num_workers: 1
  n_max: null

# Model settings
model:
  num_node_classes: 2
  hidden_dim: 64
  num_layers: 4
  T: 500
  discrete_noise_type: uniform

# Training settings
training:
  batch_size: 32
  train_val_test_split:
    - 0.8
    - 0.1
    - 0.1
  lr: 1e-3
  max_epochs: 100
  gradient_clip_val: null
  lr_scheduler: none
  lr_decay_steps: 50
  lr_decay_rate: 0.5
  early_stopping:
    enabled: true
    monitor: val_coord_mse
    patience: 10
    mode: min
  checkpoint:
    enabled: true
    monitor: val_coord_mse
    mode: min
    save_top_k: 3
    filename: "{epoch:02d}-{val_coord_mse:.4f}"

# Lightning Trainer settings
trainer:
  accelerator: auto
  devices: 1
  precision: "32"
  log_every_n_steps: 50

# Experiment logging
logging:
  loggers:
    - tensorboard
  project_name: lod-generation
  experiment_name: regnn_diffusion
  run_name: default
  save_dir: outputs
  wandb_entity: null
  wandb_offline: false
  log_model: false

resume_from: null
